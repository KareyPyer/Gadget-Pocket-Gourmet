<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1b2a41"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </radialGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7cff6b"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="url(#accent)" stroke-width="8"/>

  <!-- Chopsticks -->
  <line x1="130" y1="120" x2="210" y2="420" stroke="#c9a66b" stroke-width="10" stroke-linecap="round"/>
  <line x1="170" y1="110" x2="250" y2="410" stroke="#c9a66b" stroke-width="10" stroke-linecap="round"/>

  <!-- Bowl -->
  <path d="M150 320 Q256 430 362 320" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>

  <!-- Steam / energy -->
  <path d="M210 180 C190 150, 230 120, 210 90" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M260 180 C240 150, 280 120, 260 90" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M310 180 C290 150, 330 120, 310 90" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>

  <!-- ===== DR UMAMI (mascot) ===== -->

  <!-- Head -->
  <circle cx="330" cy="250" r="42" fill="#d9f7ff" stroke="#00d4ff" stroke-width="3"/>

  <!-- Ears -->
  <path d="M300 225 L290 200 L315 215 Z" fill="#d9f7ff" stroke="#00d4ff" stroke-width="2"/>
  <path d="M360 225 L370 200 L345 215 Z" fill="#d9f7ff" stroke="#00d4ff" stroke-width="2"/>

  <!-- Eyes -->
  <circle cx="318" cy="250" r="6" fill="#0b1020"/>
  <circle cx="342" cy="250" r="6" fill="#0b1020"/>

  <!-- Visor glow -->
  <circle cx="318" cy="248" r="2" fill="#ffffff"/>
  <circle cx="342" cy="248" r="2" fill="#ffffff"/>

  <!-- Body (lab coat) -->
  <rect x="305" y="290" width="50" height="70" rx="8" fill="#ffffff" stroke="#00d4ff" stroke-width="2"/>

  <!-- Buttons / gadgets -->
  <circle cx="318" cy="310" r="3" fill="#7cff6b"/>
  <circle cx="342" cy="330" r="3" fill="#ffd166"/>

  <!-- Arms -->
  <line x1="305" y1="310" x2="280" y2="330" stroke="#d9f7ff" stroke-width="6" stroke-linecap="round"/>
  <line x1="355" y1="310" x2="380" y2="330" stroke="#d9f7ff" stroke-width="6" stroke-linecap="round"/>

  <!-- Small clipboard -->
  <rect x="270" y="330" width="18" height="22" fill="#c9a66b" stroke="#000" stroke-width="1"/>

  <!-- Text -->
  <text x="256" y="470" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="20"
        fill="#ffffff"
        letter-spacing="2">
    GADGET POCKET GOURMET
  </text>

  <text x="256" y="495" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="12"
        fill="#7cff6b"
        letter-spacing="3">
    DR UMAMI FLAVOR LAB
  </text>

</svg>
